<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #ffffff;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem 2rem;
      border-bottom: 1px solid #333;
    }
    .nav-info {
      position: absolute;
      right: 2rem;
      text-align: right;
      font-size: 0.8rem;
      line-height: 1.4;
    }
    nav a {
      color: #ffffff;
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
      padding: 0 1.2rem;
      border-right: 1px solid #555;
    }
    nav a:last-child { border-right: none; }
    nav a:hover { text-decoration: underline; }
    nav a.active { font-weight: bold; }

    main { flex: 1; }

    .section {
      display: flex;
      align-items: center;
      padding: 3rem 5%;
      gap: 4%;
      border-bottom: 1px solid #333;
      text-decoration: none;
      color: inherit;
      transition: background 0.2s;
    }
    .section:hover { background: #0a0a0a; }
    .section:hover .section-title { text-decoration: underline; }

    .section.reverse { flex-direction: row-reverse; }

    .section-image {
      flex: 0 0 30%;
      aspect-ratio: 4 / 3;
      border: 1px solid #444;
      background: #111;
    }

    .section-text {
      flex: 1;
    }
    .section-title {
      font-size: clamp(2rem, 4vw, 1.6rem);
      letter-spacing: 0.08em;
      margin-bottom: 10rem;
      font-weight: bold;
    }
    .section-body {
      font-size: clamp(0.75rem, 1.4vw, 0.95rem);
      line-height: 1.7;
      color: #bbb;
    }
  </style>
</head>
<body>
  <nav>
    <a href="great-gatsby.html">The Great Gatsby</a>
    <a href="the-tempest.html">The Tempest</a>
    <a href="index.html" class="active">Home</a>
    <a href="modest-proposal.html">A Modest Proposal</a>
    <a href="the-runner.html">The Runner</a>
    <div class="nav-info">Minjae Youn<br>Humanities 3</div>
  </nav>

  <main>
    <a href="great-gatsby.html" class="section" style="text-align: right;">
      <div class="section-text">
        <div class="section-title">The Great Gatsby</div>
      </div>
    </a>

    <a href="the-tempest.html" class="section reverse">
      <div class="section-text">
        <div class="section-title">The Tempest</div>
      </div>
    </a>

    <a href="modest-proposal.html" class="section" style="text-align: right">
      <div class="section-text">
        <div class="section-title">A Modest Proposal</div>
      </div>
    </a>

    <a href="the-runner.html" class="section reverse">
      <div class="section-text">
        <div class="section-title">The Runner</div>
      </div>
    </a>
  </main>
</body>
</html>
